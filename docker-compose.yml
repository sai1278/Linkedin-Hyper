services:
  redis:
    image: redis:7-alpine
    command: redis-server /usr/local/etc/redis/redis.conf --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
      - ./redis/redis.conf:/usr/local/etc/redis/redis.conf:ro
    ports:
      - "127.0.0.1:6379:6379"
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: [ "CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: always
    networks:
      - linkedin-net

  api:
    build: ./api
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - API_SECRET=${API_SECRET}
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 512M
    cpus: 1.0
    restart: always
    networks:
      - linkedin-net

  worker:
    build: ./worker
    shm_size: "2gb"
    environment:
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379/0
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - PROXY_URL=${PROXY_URL}
      - DISPLAY=:99
    volumes:
      - sessions_data:/app/sessions
    depends_on:
      redis:
        condition: service_healthy
    mem_limit: 4G
    cpus: 3.0
    restart: always
    networks:
      - linkedin-net

volumes:
  redis_data:
  sessions_data:


networks:
  linkedin-net:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_icc: "true"
