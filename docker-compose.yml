services:
  # PostgreSQL database for persistent message storage.
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: linkedinuser
      POSTGRES_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      POSTGRES_DB: linkedin_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U linkedinuser -d linkedin_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --appendonly yes
      --save 60 1
      --maxmemory 256mb
      --maxmemory-policy noeviction
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
    shm_size: "1gb"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - SESSION_TTL_DAYS=${SESSION_TTL_DAYS:-30}
      - ACCOUNT_IDS=${ACCOUNT_IDS:-}
      - MESSAGE_SYNC_DISABLED_ACCOUNT_IDS=${MESSAGE_SYNC_DISABLED_ACCOUNT_IDS:-}
      - API_SECRET=${API_SECRET}
      - BROWSER_USE_SYSTEM_CHROME=${BROWSER_USE_SYSTEM_CHROME:-1}
      - BROWSER_HEADLESS=${BROWSER_HEADLESS:-0}
      - PROXY_URL=${PROXY_URL:-}
      - HTTP_PROXY=${PROXY_URL:-}
      - HTTPS_PROXY=${PROXY_URL:-}
      - DATABASE_URL=postgresql://linkedinuser:${DB_PASSWORD}@postgres:5432/linkedin_db
      - POSTGRES_URL=postgresql://linkedinuser:${DB_PASSWORD}@postgres:5432/linkedin_db
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    restart: always
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "1.5"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
    # Keep ports in override files to avoid duplicate publish rules
    # when using multiple compose files (base + prod).
    environment:
      - API_URL=http://worker:3001
      - API_SECRET=${API_SECRET}
      - PROXY_AUTH_TOKENS=${PROXY_AUTH_TOKENS}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_ROUTE_AUTH_TOKEN=${API_ROUTE_AUTH_TOKEN}
      - PROXY_AUTH_COOKIE_NAME=${PROXY_AUTH_COOKIE_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      - DASHBOARD_PASSWORD=${DASHBOARD_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_MAX_AGE=${SESSION_MAX_AGE}
      - NEXT_PUBLIC_WS_URL=${NEXT_PUBLIC_WS_URL}
      - DATABASE_URL=postgresql://linkedinuser:${DB_PASSWORD}@postgres:5432/linkedin_db
      - POSTGRES_URL=postgresql://linkedinuser:${DB_PASSWORD}@postgres:5432/linkedin_db
    depends_on:
      worker:
        condition: service_healthy
    restart: always

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
