version: '3.8'

services:
  redis:
    image: redis:alpine
    # FIXED: added requirepass — never run Redis without auth in production
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory 256mb
      --maxmemory-policy noeviction
    # FIXED: removed host port exposure — Redis must be internal only
    # ports: - "6379:6379"   ← do NOT expose Redis to host
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ./worker
    shm_size: '1gb'   # NON-NEGOTIABLE — Chrome uses /dev/shm
    environment:
      # FIXED: added all 3 Redis vars (worker reads these separately, NOT REDIS_URL)
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
      # FIXED: added SESSION_ENCRYPTION_KEY — fatal throw without it
      - SESSION_ENCRYPTION_KEY=${SESSION_ENCRYPTION_KEY}
      - ACCOUNT_IDS=${ACCOUNT_IDS}
      - API_SECRET=${API_SECRET}
      #- API_KEY = ${API_KEY}
      - PROXY_URL=${PROXY_URL}
      - HTTP_PROXY=${PROXY_URL}
      - HTTPS_PROXY=${PROXY_URL}
    depends_on:
      redis:
        condition: service_healthy
    restart: always
    # A5 — Resource limits so a runaway Chrome can't OOM the host
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: '1.5'
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/health"]
      interval: 15s
      timeout: 5s
      retries: 3

  frontend:
    build:
      context: .
    ports:
      - "3000:3000"
    environment:
      # FIXED: API_URL points to internal worker hostname
      - API_URL=http://worker:3001
      - API_SECRET=${API_SECRET}
      - PROXY_AUTH_TOKENS=${PROXY_AUTH_TOKENS}
      #- API_KEY=${API_KEY}
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
      - API_ROUTE_AUTH_TOKEN=${API_ROUTE_AUTH_TOKEN}
      - PROXY_AUTH_COOKIE_NAME=${PROXY_AUTH_COOKIE_NAME}
      - REDIS_URL=redis://:${REDIS_PASSWORD}@redis:6379
    depends_on:
      worker:
        condition: service_healthy
    restart: always
