name: Build and Push to Harbor

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
  workflow_dispatch:

env:
  PRODUCT_VERSION: "latest"
  VERSION: "1.2.0"
  ENVIRONMENT: "s9p"
  HARBOR_REGISTRY: image-reg.ops.glynac.ai
  HARBOR_PROJECT: acumen-blogs/strapi

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      IMAGE_TAG: ${{ steps.export_tag.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Generate IMAGE_TAG
        id: export_tag
        run: |
          IMAGE_TAG="${ENVIRONMENT}-v${VERSION}-${GITHUB_SHA}"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Login to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ env.HARBOR_REGISTRY }}
          username: admin
          password: ${{ secrets.HARBOR_TOKEN }}

      - name: Build & Push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./backend/
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.HARBOR_REGISTRY }}/${{ env.HARBOR_PROJECT }}:${{ env.IMAGE_TAG }}

  deploy:
    runs-on: ubuntu-latest
    needs: build

    env:
      IMAGE_TAG: ${{ needs.build.outputs.IMAGE_TAG }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Nomad
        uses: hashicorp/setup-nomad@main
        with:
          version: ${{ env.PRODUCT_VERSION }}

      - name: Update Nomad job image tag
        run: |
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${IMAGE_TAG}|g" backend/nomad/strapi.hcl

      - name: Deploy to Nomad
        env:
          NOMAD_ADDR: ${{ vars.NOMAD_ADDR }}
          NOMAD_TOKEN: ${{ secrets.NOMAD_TOKEN }}
        run: |
          nomad job run backend/nomad/strapi.hcl

  notify:
    runs-on: ubuntu-latest
    needs: [build, deploy]
    if: always()

    steps:
      - name: Send Telegram Notification
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          TELEGRAM_THREAD_ID: ${{ secrets.TELEGRAM_THREAD_ID }}
          IMAGE_TAG: ${{ needs.build.outputs.IMAGE_TAG }}
          JOB_STATUS: ${{ needs.deploy.result }}
        run: |
          PIPELINE_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          BRANCH="${{ github.ref_name }}"
          ACTOR="${{ github.actor }}"

          if [ "$JOB_STATUS" = "success" ]; then
            STATUS="SUCCESS"
            EMOJI="✅"
          elif [ "$JOB_STATUS" = "cancelled" ]; then
            STATUS="CANCELLED"
            EMOJI="⚠️"
          else
            STATUS="FAILED"
            EMOJI="❌"
          fi

          MESSAGE=$(printf "🚀 Acumen Strapi Deployment\n\n📦 Image: %s\n🌿 Branch: %s\n👤 Triggered by: %s\n📊 Status: %s %s\n\n🔗 %s" \
            "$IMAGE_TAG" \
            "$BRANCH" \
            "$ACTOR" \
            "$EMOJI" \
            "$STATUS" \
            "$PIPELINE_URL")

          if [ -z "$TELEGRAM_THREAD_ID" ]; then
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              --data-urlencode "text=${MESSAGE}"
          else
            curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_TOKEN}/sendMessage" \
              -d "chat_id=${TELEGRAM_CHAT_ID}" \
              -d "message_thread_id=${TELEGRAM_THREAD_ID}" \
              --data-urlencode "text=${MESSAGE}"
          fi
