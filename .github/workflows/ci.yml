name: CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      JWT_SECRET: test-jwt-secret-012345678901234567890123
      API_SECRET: test-api-secret
      API_URL: http://127.0.0.1:3001
      NEXT_PUBLIC_API_URL: /api
      NEXT_PUBLIC_WS_URL: ''
      SESSION_ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
      DATABASE_URL: postgresql://test:test@127.0.0.1:5432/testdb
      POSTGRES_URL: postgresql://test:test@127.0.0.1:5432/testdb
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: '6379'
      DISABLE_REDIS: '1'
      PROXY_AUTH_COOKIE_NAME: proxy_session
      ALLOW_STATIC_SERVICE_TOKENS: 'false'
      INITIAL_ADMIN_EMAILS: admin@example.com
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit --pretty false

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
