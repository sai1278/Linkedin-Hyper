name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'types/**'
      - 'public/**'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - '.github/workflows/frontend-ci.yml'
      - 'linkedin-chat-tracker/**'
  pull_request:
    branches: [main]
    paths:
      - 'app/**'
      - 'components/**'
      - 'lib/**'
      - 'types/**'
      - 'public/**'
      - 'next.config.ts'
      - 'tsconfig.json'
      - 'package.json'
      - '.github/workflows/frontend-ci.yml'
      - 'linkedin-chat-tracker/**'

jobs:
  blog-frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    env:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: /api
    defaults:
      run:
        working-directory: .

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript no-emit check
        run: npx tsc --noEmit --pretty false

      - name: ESLint
        run: npm run lint